<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .float { animation: float 3s ease-in-out infinite; }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>

    <defs>
        <!-- Background gradient -->
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
        </radialGradient>

        <!-- Paper gradient -->
        <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f1f5f9"/>
        </linearGradient>

        <!-- Primary accent gradient -->
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
        </linearGradient>

        <!-- Check circle gradient -->
        <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4ade80"/>
            <stop offset="100%" stop-color="#22c55e"/>
        </linearGradient>

        <!-- Shadow filter -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(102,126,234,0.3)"/>
        </filter>

        <!-- Soft glow -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Outer glow circle -->
    <circle cx="100" cy="100" r="85" fill="url(#bgGlow)" class="pulse" style="transform-origin: center;"/>

    <!-- Inner decorative circle -->
    <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Main document group with float animation -->
    <g class="float" style="transform-origin: center;">
        <!-- Paper shadow -->
        <rect x="58" y="52" width="84" height="108" rx="10" fill="rgba(0,0,0,0.1)" filter="url(#shadow)"/>

        <!-- Main paper -->
        <rect x="55" y="48" width="84" height="108" rx="10" fill="url(#paperGradient)"/>

        <!-- Paper fold effect -->
        <path d="M129 48 L139 58 L129 58 Z" fill="#e2e8f0"/>

        <!-- Title line -->
        <rect x="68" y="65" width="45" height="6" rx="3" fill="url(#accentGradient)"/>

        <!-- Content lines with varying opacity -->
        <rect x="68" y="80" width="58" height="4" rx="2" fill="#cbd5e1"/>
        <rect x="68" y="92" width="50" height="4" rx="2" fill="#e2e8f0"/>
        <rect x="68" y="104" width="54" height="4" rx="2" fill="#e2e8f0"/>
        <rect x="68" y="116" width="38" height="4" rx="2" fill="#e2e8f0"/>

        <!-- Divider line -->
        <rect x="68" y="128" width="58" height="1" rx="0.5" fill="#e2e8f0"/>

        <!-- Bottom accent line -->
        <rect x="68" y="138" width="30" height="5" rx="2.5" fill="url(#accentGradient)" opacity="0.7"/>
    </g>

    <!-- Check badge with pulse -->
    <g class="pulse" style="transform-origin: 148px 138px;">
        <!-- Badge shadow -->
        <circle cx="150" cy="140" r="26" fill="rgba(34,197,94,0.3)"/>

        <!-- Badge background -->
        <circle cx="148" cy="138" r="24" fill="url(#checkGradient)" filter="url(#glow)"/>

        <!-- Inner circle highlight -->
        <circle cx="145" cy="132" r="8" fill="rgba(255,255,255,0.2)"/>

        <!-- Checkmark -->
        <path d="M138 138l7 7 14-14" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Decorative dots -->
    <circle cx="35" cy="60" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="165" cy="45" r="2" fill="rgba(255,255,255,0.25)"/>
    <circle cx="170" cy="90" r="2.5" fill="rgba(255,255,255,0.2)"/>
</svg>
