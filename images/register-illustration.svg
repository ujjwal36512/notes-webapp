<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .float-slow { animation: floatSlow 4s ease-in-out infinite; }
        .float-fast { animation: floatFast 3s ease-in-out infinite 0.5s; }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        .rotate-subtle { animation: rotateSubtle 6s ease-in-out infinite; }
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) rotate(-5deg); }
            50% { transform: translateY(-6px) rotate(-5deg); }
        }
        @keyframes floatFast {
            0%, 100% { transform: translateY(0px) rotate(5deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        @keyframes rotateSubtle {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(3deg); }
        }
    </style>

    <defs>
        <!-- Background gradient -->
        <radialGradient id="bgGlow2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
        </radialGradient>

        <!-- Paper gradient for back note -->
        <linearGradient id="paperBack" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#e2e8f0"/>
        </linearGradient>

        <!-- Paper gradient for front note -->
        <linearGradient id="paperFront" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f1f5f9"/>
        </linearGradient>

        <!-- Primary accent gradient -->
        <linearGradient id="accentPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
        </linearGradient>

        <!-- Secondary accent gradient -->
        <linearGradient id="accentSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#764ba2"/>
            <stop offset="100%" stop-color="#667eea"/>
        </linearGradient>

        <!-- Plus button gradient -->
        <linearGradient id="plusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="50%" stop-color="#764ba2"/>
            <stop offset="100%" stop-color="#667eea"/>
        </linearGradient>

        <!-- Shadow filter -->
        <filter id="shadow2" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(102,126,234,0.25)"/>
        </filter>

        <!-- Deeper shadow for back card -->
        <filter id="shadowDeep" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.15)"/>
        </filter>

        <!-- Glow effect -->
        <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Outer glow circle -->
    <circle cx="100" cy="100" r="88" fill="url(#bgGlow2)" class="pulse" style="transform-origin: center;"/>

    <!-- Decorative ring -->
    <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="8 4"/>

    <!-- Back note (left, rotated) -->
    <g class="float-slow" style="transform-origin: 75px 85px;">
        <!-- Shadow -->
        <rect x="40" y="38" width="72" height="94" rx="8" fill="rgba(0,0,0,0.08)" filter="url(#shadowDeep)" transform="rotate(-5 75 85)"/>

        <!-- Paper -->
        <rect x="38" y="35" width="72" height="94" rx="8" fill="url(#paperBack)" transform="rotate(-5 75 85)"/>

        <!-- Fold corner -->
        <path d="M100 35 L110 45 L100 45 Z" fill="#cbd5e1" transform="rotate(-5 75 85)"/>

        <!-- Title line -->
        <rect x="50" y="52" width="38" height="5" rx="2.5" fill="url(#accentPrimary)" transform="rotate(-5 75 85)"/>

        <!-- Content lines -->
        <rect x="50" y="64" width="52" height="3" rx="1.5" fill="#cbd5e1" transform="rotate(-5 75 85)"/>
        <rect x="50" y="73" width="46" height="3" rx="1.5" fill="#e2e8f0" transform="rotate(-5 75 85)"/>
        <rect x="50" y="82" width="42" height="3" rx="1.5" fill="#e2e8f0" transform="rotate(-5 75 85)"/>
        <rect x="50" y="91" width="35" height="3" rx="1.5" fill="#e2e8f0" transform="rotate(-5 75 85)"/>

        <!-- Small checkbox -->
        <rect x="50" y="105" width="8" height="8" rx="2" fill="none" stroke="#cbd5e1" stroke-width="1.5" transform="rotate(-5 75 85)"/>
        <rect x="62" y="107" width="28" height="3" rx="1.5" fill="#e2e8f0" transform="rotate(-5 75 85)"/>
    </g>

    <!-- Front note (right, rotated) -->
    <g class="float-fast" style="transform-origin: 115px 100px;">
        <!-- Shadow -->
        <rect x="82" y="55" width="72" height="94" rx="8" fill="rgba(0,0,0,0.1)" filter="url(#shadow2)" transform="rotate(5 115 100)"/>

        <!-- Paper -->
        <rect x="80" y="52" width="72" height="94" rx="8" fill="url(#paperFront)" transform="rotate(5 115 100)"/>

        <!-- Fold corner -->
        <path d="M142 52 L152 62 L142 62 Z" fill="#e2e8f0" transform="rotate(5 115 100)"/>

        <!-- Title line -->
        <rect x="92" y="70" width="38" height="5" rx="2.5" fill="url(#accentSecondary)" transform="rotate(5 115 100)"/>

        <!-- Content lines -->
        <rect x="92" y="82" width="52" height="3" rx="1.5" fill="#94a3b8" transform="rotate(5 115 100)"/>
        <rect x="92" y="91" width="46" height="3" rx="1.5" fill="#cbd5e1" transform="rotate(5 115 100)"/>
        <rect x="92" y="100" width="50" height="3" rx="1.5" fill="#e2e8f0" transform="rotate(5 115 100)"/>
        <rect x="92" y="109" width="38" height="3" rx="1.5" fill="#e2e8f0" transform="rotate(5 115 100)"/>

        <!-- Checkmark icon -->
        <circle cx="138" cy="125" r="6" fill="url(#accentPrimary)" opacity="0.2" transform="rotate(5 115 100)"/>
        <path d="M135 125l2 2 4-4" stroke="#667eea" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(5 115 100)"/>
    </g>

    <!-- Plus button with pulse -->
    <g class="pulse" style="transform-origin: 155px 150px;">
        <!-- Button shadow -->
        <circle cx="157" cy="152" r="22" fill="rgba(102,126,234,0.3)"/>

        <!-- Button background -->
        <circle cx="155" cy="150" r="20" fill="url(#plusGradient)" filter="url(#glow2)"/>

        <!-- Inner highlight -->
        <circle cx="150" cy="144" r="7" fill="rgba(255,255,255,0.25)"/>

        <!-- Plus icon -->
        <path d="M148 150h14M155 143v14" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- Decorative elements -->
    <circle cx="30" cy="70" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="45" cy="160" r="2" fill="rgba(255,255,255,0.25)"/>
    <circle cx="175" cy="55" r="2.5" fill="rgba(255,255,255,0.2)"/>
    <circle cx="25" cy="130" r="1.5" fill="rgba(255,255,255,0.15)"/>

    <!-- Sparkle effects -->
    <g opacity="0.4">
        <path d="M170 80l2-4 2 4-4-2 4 0z" fill="white"/>
        <path d="M35 100l1.5-3 1.5 3-3-1.5 3 0z" fill="white"/>
    </g>
</svg>
